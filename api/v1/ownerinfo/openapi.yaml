openapi: 3.0.0
info:
  title: Owner Redirect Info API (Deprecated)
  version: 1.1.0
  description: |
    An API for managing the owner redirect info (RVTO2Addr)

    (Deprecated: please use "/rvto2addr" endpoint instead)
  contact:
    name: Go FDO Server API Support
    url: https://github.com/fido-device-onboard/go-fdo-server/issues
tags:
  - name: rvto2addr
    description: |
      Operations related to owner redirect info management (RVTO2Addr).

      Typical workflow: Get current configuration (GET) →
      Update configuration (PUT) → Delete when no longer needed (DELETE).
      The TO2 address tells devices where to find the owner server after rendezvous.

      (Deprecated: please use "/rvto2addr" endpoint instead)
paths:
  /owner/redirect:
    get:
      operationId: GetRVTO2Addr
      summary: Get the current owner redirect info (RVTO2Addr) configuration (Deprecated)
      description: |
        Retrieves the current rendezvous TO2 (Transfer of Ownership 2) address
        configuration that specifies where devices should connect to the owner server
        after completing the rendezvous protocol.

        (Deprecated: please use "/rvto2addr" endpoint instead)
      tags:
        - rvto2addr
      responses:
        "200":
          description: Successfully retrieved the owner redirect info (RVTO2Addr) configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RVTO2Addr"
              examples:
                simpleHttpConfig:
                  summary: Simple HTTP configuration with DNS
                  value:
                    - protocol: http
                      dns: owner.example.com
                      port: "8080"
                httpsWithDNS:
                  summary: HTTPS configuration with DNS
                  value:
                    - protocol: https
                      dns: owner-secure.example.com
                      port: "8443"
                httpsWithIP:
                  summary: HTTPS configuration with IP address
                  value:
                    - protocol: https
                      ip: 192.168.1.100
                      port: "8443"
                httpsWithBothDnsAndIP:
                  summary: HTTPS configuration with both DNS and IP
                  description: Both dns and ip can be provided together
                  value:
                    - protocol: https
                      dns: owner.example.com
                      ip: 192.168.1.100
                      port: "8443"
                multipleAddresses:
                  summary: Multiple addresses with primary and backup
                  value:
                    - protocol: https
                      dns: owner-primary.example.com
                      port: "8443"
                    - protocol: https
                      dns: owner-backup.example.com
                      port: "8443"
                    - protocol: https
                      ip: 192.168.1.100
                      port: "8443"
        "404":
          description: No RVTO2Addr configuration has been created yet.
          content:
            text/plain:
              schema:
                $ref: "../components/openapi.yaml#/components/schemas/ErrorString"
              example: "No ownerInfo found"
        "500":
          description: Internal server error occurred while fetching the configuration.
          content:
            text/plain:
              schema:
                $ref: "../components/openapi.yaml#/components/schemas/ErrorString"
              example: "Error fetching ownerInfo"
    post:
      operationId: CreateRVTO2Addr
      summary: Create the owner redirect info (RVTOAddr) configuration (Deprecated)
      description: |
        Creates the owner redirect info (RVTO2Addr) configuration.

        The new configuration will be used by devices completing the TO2 protocol
        to determine where to connect to the owner server. This typically includes
        the owner server's hostname/IP address, protocol, and port.

        (Deprecated: please use "/rvto2addr" endpoint instead)
      tags:
        - rvto2addr
      requestBody:
        description: The new owner redirect info (RVTO2Addr) configuration
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RVTO2Addr"
            examples:
              createHttps:
                summary: Create HTTPS with DNS
                value:
                  - protocol: https
                    dns: owner-new.example.com
                    port: "8443"
              createMultipleAddresses:
                summary: Create with primary and backup addresses
                value:
                  - protocol: https
                    dns: owner-primary.example.com
                    port: "8443"
                  - protocol: https
                    dns: owner-backup.example.com
                    port: "8443"
              createIPBased:
                summary: Create IP-based configuration
                value:
                  - protocol: https
                    ip: 10.0.0.50
                    port: "8443"
              createWithBothDnsAndIP:
                summary: Create with both DNS and IP address
                description: Demonstrates that both dns and ip can be provided together
                value:
                  - protocol: https
                    dns: owner-dual.example.com
                    ip: 10.0.0.100
                    port: "8443"
      responses:
        "201":
          description: Successfully created the owner redirect info (RVTO2Addr) configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RVTO2Addr"
              examples:
                createdHttpsConfiguration:
                  summary: Successfully created to HTTPS configuration
                  value:
                    - protocol: https
                      dns: owner-new.example.com
                      port: "8443"
                createdMultipleAddresses:
                  summary: Successfully created with multiple addresses
                  value:
                    - protocol: https
                      dns: owner-primary.example.com
                      port: "8443"
                    - protocol: https
                      dns: owner-backup.example.com
                      port: "8443"
        "400":
          description: Invalid owner redirect info (RVTO2Addr) configuration provided in the request body.
          content:
            text/plain:
              schema:
                $ref: "../components/openapi.yaml#/components/schemas/ErrorString"
              example: "Invalid ownerInfo"
        "409":
          description: Owner redirect info (RVTO2Addr) configuration already exists. Use PUT to update instead.
          content:
            text/plain:
              schema:
                $ref: "../components/openapi.yaml#/components/schemas/ErrorString"
              example: "ownerInfo already exists"
        "413":
          description: Request payload too large (exceeds maximum allowed size).
          content:
            text/plain:
              schema:
                $ref: "../components/openapi.yaml#/components/schemas/ErrorString"
              example: "http: request body too large"
        "500":
          description: Internal server error occurred while creating the configuration.
          content:
            text/plain:
              schema:
                $ref: "../components/openapi.yaml#/components/schemas/ErrorString"
              examples:
                readError:
                  summary: Error reading request body
                  value: "Error reading body"
                insertError:
                  summary: Error inserting into database
                  value: "Error inserting ownerInfo"

    put:
      operationId: UpdateRVTO2Addr
      summary: Update the owner redirect info (RVTO2Addr) configuration (Deprecated)
      description: |
        Updates the owner redirect info (RVTO2Addr) configuration.

        The new configuration will be used by devices completing the TO2 protocol
        to determine where to connect to the owner server. This typically includes
        the owner server's hostname/IP address, protocol, and port.

        (Deprecated: please use "/rvto2addr" endpoint instead)
      tags:
        - rvto2addr
      requestBody:
        description: The new owner redirect info (RVTO2Addr) configuration
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RVTO2Addr"
            examples:
              updateToHttps:
                summary: Update to HTTPS with DNS
                value:
                  - protocol: https
                    dns: owner-new.example.com
                    port: "8443"
              updateToMultipleAddresses:
                summary: Update with primary and backup addresses
                value:
                  - protocol: https
                    dns: owner-primary.example.com
                    port: "8443"
                  - protocol: https
                    dns: owner-backup.example.com
                    port: "8443"
              updateToIPBased:
                summary: Update to IP-based configuration
                value:
                  - protocol: https
                    ip: 10.0.0.50
                    port: "8443"
              updateWithBothDnsAndIP:
                summary: Update with both DNS and IP address
                description: Demonstrates that both dns and ip can be provided together
                value:
                  - protocol: https
                    dns: owner-dual.example.com
                    ip: 10.0.0.100
                    port: "8443"
      responses:
        "200":
          description: Successfully updated the owner redirect info (RVTO2Addr) configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RVTO2Addr"
              examples:
                updatedHttpsConfiguration:
                  summary: Successfully updated to HTTPS configuration
                  value:
                    - protocol: https
                      dns: owner-new.example.com
                      port: "8443"
                updatedMultipleAddresses:
                  summary: Successfully updated with multiple addresses
                  value:
                    - protocol: https
                      dns: owner-primary.example.com
                      port: "8443"
                    - protocol: https
                      dns: owner-backup.example.com
                      port: "8443"
        "400":
          description: Invalid owner redirect info (RVTO2Addr) configuration provided in the request body.
          content:
            text/plain:
              schema:
                $ref: "../components/openapi.yaml#/components/schemas/ErrorString"
              example: "Invalid ownerInfo"
        "404":
          description: Owner redirect info (RVTO2Addr) configuration does not exist. Use POST to create it first.
          content:
            text/plain:
              schema:
                $ref: "../components/openapi.yaml#/components/schemas/ErrorString"
              example: "ownerInfo does not exist"
        "413":
          description: Request payload too large (exceeds maximum allowed size).
          content:
            text/plain:
              schema:
                $ref: "../components/openapi.yaml#/components/schemas/ErrorString"
              example: "http: request body too large"
        "500":
          description: Internal server error occurred while updating the configuration.
          content:
            text/plain:
              schema:
                $ref: "../components/openapi.yaml#/components/schemas/ErrorString"
              examples:
                readError:
                  summary: Error reading request body
                  value: "Error reading body"
                updateError:
                  summary: Error updating in database
                  value: "Error updating ownerInfo"
components:
  schemas:
    RVTO2Addr:
      type: array
      description: |
        Rendezvous TO2 address configuration. Specifies one or more owner server
        addresses that devices should use to connect during the TO2 (Transfer of
        Ownership 2) protocol after completing rendezvous. Multiple entries provide
        fallback options if the primary address is unreachable.
      items:
        $ref: "#/components/schemas/RVTO2AddrEntry"
    RVTO2AddrEntry:
      type: object
      description: |
        A single owner server address entry. Each entry specifies the protocol,
        network location (DNS hostname and/or IP address), and port for connecting
        to the owner server during TO2 protocol.

        Both 'dns' and 'ip' fields are optional and may be provided independently
        or together. However, at least one addressing method MUST be specified
        (non-null) as required by FDO specification section 3.3.14. Requests that
        omit both 'dns' and 'ip' will be rejected with a 400 Bad Request error.

        When both 'dns' and 'ip' are provided, the device MUST attempt to connect
        using the DNS address first. The device MUST only use the IP address after
        all DNS connection attempts have failed. This behavior is defined in the
        FDO specification section 3.3.14.
      required:
        - protocol
        - port
      properties:
        protocol:
          $ref: "#/components/schemas/TransportProtocol"
        dns:
          $ref: "../components/openapi.yaml#/components/schemas/DNSHostname"
        ip:
          $ref: "../components/openapi.yaml#/components/schemas/IPv4Address"
        port:
          $ref: "#/components/schemas/PortString"
    TransportProtocol:
      type: string
      description: |
        Transport protocol for TO2 owner server connections
        (FDO specification section 3.3.14, TransportProtocol).
        - `http` - HTTP protocol (code 3)
        - `https` - HTTPS protocol (code 5)
        - `tcp` - Raw TCP connection (code 1)
        - `tls` - TLS-secured TCP connection (code 2)
        - `coap` - CoAP over UDP (code 4)
        - `rest` - RESTful HTTP/HTTPS (mapped to HTTPS)
      enum:
        - "rest"
        - "http"
        - "https"
        - "tcp"
        - "tls"
        - "coap"
      example: "https"
    PortString:
      type: string
      example: "8443"

